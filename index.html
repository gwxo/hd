<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gw Live // Red Edition</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
:root {
    /* Theme Colors - Red Edition */
    --brand-red: #FF3131;
    --glass-bg: rgba(255, 0, 0, 0.08); /* Red tinted glass */
    --glass-border: rgba(255, 255, 255, 0.15);
    --glow-opacity: rgba(255, 49, 49, 0.4);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,sans-serif; user-select: none; -webkit-user-select: none;}

.shaka-video-container { position:fixed; inset:0; background:#000; }
video { width:100%; height:100%; object-fit:contain; }

/* --- Smaller Red Glassmorphism Branding --- */
.top-branding {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px; /* Reduced padding */
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 12px; /* Smaller corners */
    border: 1px solid var(--glass-border);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    pointer-events: none;
}

.brand-name {
    font-size: 15px; /* Smaller font size */
    font-weight: 800;
    color: var(--brand-red);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    /* Red Shimmer Effect */
    background: linear-gradient(to right, #ff0000 20%, #ff8888 40%, #ff8888 60%, #ff0000 80%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s linear infinite;
    text-shadow: 0 0 10px var(--glow-opacity);
}

@keyframes shine {
    to { background-position: 200% center; }
}

.live-indicator {
    width: 8px; /* Smaller dot */
    height: 8px;
    background-color: var(--brand-red);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--brand-red);
    position: relative;
}

.live-indicator::after {
    content: '';
    position: absolute;
    inset: -3px;
    border: 1px solid var(--brand-red);
    border-radius: 50%;
    animation: ripple 2s infinite;
}

@keyframes ripple {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}

/* --- Red UI Customization --- */
.shaka-icon-button { color: var(--brand-red) !important; }
.shaka-range-element { color: var(--brand-red) !important; }
.shaka-current-time { color: white !important; font-size: 13px; }

/* Custom Seekbar */
.shaka-seek-bar-container .shaka-range-element {
    background: rgba(255,255,255,0.1) !important;
}

/* Protection Screen Overlay */
.block-overlay{
    position:fixed; inset:0; z-index:99999; display:flex; align-items:center; justify-content:center; background:#000;
}
.block-box{
    padding:40px; border: 1px solid var(--brand-red); border-radius: 20px; background: rgba(10,10,10,0.95); text-align:center;
}
.block-title { color: var(--brand-red); font-size: 28px; font-weight: 800; }

@media(max-width:700px){
    .top-branding { top: 15px; left: 15px; padding: 6px 12px; }
    .brand-name { font-size: 12px; }
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="shaka-video-container" id="player-container">
    <!-- Smaller Branding Box -->
    <div class="top-branding" id="ui-brand">
        <div class="live-indicator"></div>
        <div class="brand-name">Gw Live</div>
    </div>
    <video id="video" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){

  // --- 1. SECURITY & ANTI-DEVTOOLS ---
  setInterval(function() {
      const start = Date.now();
      debugger; 
      if (Date.now() - start > 100) window.location.reload();
  }, 1000);

  document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))) {
          e.preventDefault(); return false;
      }
  });

  // --- 2. CONFIG & LOGIC ---
  const CONFIG={
    streamUrl:"https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl:"https://allrounder-live.pages.dev/api/cookie.json"
  };

  document.addEventListener("DOMContentLoaded",async()=>{
    shaka.polyfill.installAll();
    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    const player=new shaka.Player();
    await player.attach(video);
    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: ["play_pause", "mute", "volume", "spacer", "quality", "fullscreen"],
      seekBarColors: { base: "rgba(255,255,255,0.2)", buffered: "rgba(255,255,255,0.4)", played: "#FF3131" }
    });

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{ lowLatencyMode:true, bufferingGoal:10, rebufferingGoal:2 }
    });

    // Cookie logic
    let cookieValue="";
    try {
      const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const data=await response.json();
      cookieValue=data.cookie||"";
    } catch(e){}

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        request.headers["Referer"]="https://www.jiotv.com/";
        request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"]=cookieValue;
        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;
        if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&!request.uris[0].includes("__hdnea__")){
          request.uris[0] += (request.uris[0].includes("?")?"&":"?") + "__hdnea__=" + urlCookie;
        }
      });
    }

    try { await player.load(CONFIG.streamUrl); video.play(); } catch(e){}
    video.addEventListener("play",()=>{ video.muted=false; });
  });
})();
</script>
</body>
</html>
