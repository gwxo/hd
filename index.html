<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gw Live // Auto Streaming</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
body {margin:0;background:#000;}
#video {width:100%;height:100vh;}
.brand {
  position:absolute;top:15px;left:15px;
  color:#fff;background:rgba(0,0,0,0.6);
  padding:6px 12px;border-radius:8px;
}
</style>
</head>

<body>

<div class="brand">🔴 Gw Live</div>
<video id="video" autoplay muted playsinline></video>

<script>
(async function(){

// 🔥 YOUR WORKER API
const WORKER_URL = "https://apiscrape.codewithprashant07.workers.dev/";

// 🔄 GET CONFIG FROM API
async function getConfig() {
  try {
    const res = await fetch(WORKER_URL + "?t=" + Date.now());
    return await res.json();
  } catch (e) {
    console.error("API error", e);
    return null;
  }
}

// 🎬 INIT PLAYER
shaka.polyfill.installAll();

const video = document.getElementById("video");
const player = new shaka.Player();
await player.attach(video);

// 🔁 LOAD STREAM FUNCTION
async function loadStream() {
  const CONFIG = await getConfig();
  if (!CONFIG) return;

  try {
    await player.unload();
  } catch(e){}

  // DRM
  player.configure({
    drm: {
      clearKeys: {
        [CONFIG.keyId]: CONFIG.key
      }
    }
  });

  // 🍪 COOKIE
  let cookieValue = "";
  try {
    const res = await fetch(CONFIG.cookieUrl + "?t=" + Date.now());
    const data = await res.json();
    cookieValue = data.cookie || "";
  } catch(e){}

  if (cookieValue) {
    player.getNetworkingEngine().clearAllRequestFilters();

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers["Referer"] = "https://www.jiotv.com/";
      request.headers["User-Agent"] = "plaYtv";
      request.headers["Cookie"] = cookieValue;

      let token = cookieValue.replace("__hdnea__=","").split(";")[0];

      if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
           type === shaka.net.NetworkingEngine.RequestType.SEGMENT)
           && !request.uris[0].includes("__hdnea__")) {

        const sep = request.uris[0].includes("?") ? "&" : "?";
        request.uris[0] += sep + "__hdnea__=" + token;
      }
    });
  }

  try {
    await player.load(CONFIG.streamUrl);
    video.play().catch(()=>{});
    console.log("Stream loaded ✅");
  } catch(e) {
    console.error("Stream error", e);
  }
}

// ▶ FIRST LOAD
await loadStream();

// 🔄 AUTO UPDATE EVERY 20 SEC
setInterval(loadStream, 20000);

// 🔊 UNMUTE ON PLAY
video.addEventListener("play", () => {
  video.muted = false;
});

})();
</script>

</body>
</html>
